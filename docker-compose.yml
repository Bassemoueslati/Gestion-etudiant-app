version: '3.8'

services:
  # =============================================================================
  # Laravel Application (PHP-FPM)
  # =============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: gestion_etudiant_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=gestion_etudiant
      - DB_USERNAME=root
      - DB_PASSWORD=root_password
      - REDIS_HOST=redis
      - REDIS_PASSWORD=redis_password
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
    networks:
      - gestion_etudiant_network

  # =============================================================================
  # Nginx Web Server
  # =============================================================================
  nginx:
    image: nginx:alpine
    container_name: gestion_etudiant_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/conf.d:ro
    depends_on:
      - app
    networks:
      - gestion_etudiant_network

  # =============================================================================
  # MySQL Database
  # =============================================================================
  mysql:
    image: mysql:8.0
    container_name: gestion_etudiant_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=gestion_etudiant
      - MYSQL_USER=gestion_user
      - MYSQL_PASSWORD=gestion_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
    ports:
      - "3306:3306"
    networks:
      - gestion_etudiant_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Redis Cache & Queue
  # =============================================================================
  redis:
    image: redis:alpine
    container_name: gestion_etudiant_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - gestion_etudiant_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Composer (for running commands)
  # =============================================================================
  composer:
    image: composer:2
    container_name: gestion_etudiant_composer
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - app
    networks:
      - gestion_etudiant_network

  # =============================================================================
  # Artisan Commands
  # =============================================================================
  artisan:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: gestion_etudiant_artisan
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=gestion_etudiant
      - DB_USERNAME=root
      - DB_PASSWORD=root_password
      - REDIS_HOST=redis
      - REDIS_PASSWORD=redis_password
      - REDIS_PORT=6379
    entrypoint: ["php", "/var/www/artisan"]
    networks:
      - gestion_etudiant_network

  # =============================================================================
  # NPM / Node.js
  # =============================================================================
  npm:
    image: node:20-alpine
    container_name: gestion_etudiant_npm
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - app
    networks:
      - gestion_etudiant_network
    entrypoint: ["npm"]

  # =============================================================================
  # Mailpit (Development Mail Server)
  # =============================================================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: gestion_etudiant_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - gestion_etudiant_network

networks:
  gestion_etudiant_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
