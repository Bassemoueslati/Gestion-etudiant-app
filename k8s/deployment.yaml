---
# =============================================================================
# Kubernetes Deployment for Laravel Application
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gestion-etudiant-app
  namespace: gestion-etudiant
  labels:
    app: gestion-etudiant
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gestion-etudiant
      tier: backend
  template:
    metadata:
      labels:
        app: gestion-etudiant
        tier: backend
    spec:
      containers:
        # PHP-FPM Application Container
        - name: app
          image: gestion-etudiant-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
          env:
            - name: APP_ENV
              value: "production"
            - name: APP_DEBUG
              value: "false"
            - name: APP_URL
              value: "https://gestion-etudiant.example.com"
            - name: DB_CONNECTION
              valueFrom:
                secretKeyRef:
                  name: gestion-etudiant-secrets
                  key: DB_CONNECTION
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: gestion-etudiant-config
                  key: DB_HOST
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: gestion-etudiant-secrets
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: gestion-etudiant-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gestion-etudiant-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: gestion-etudiant-config
                  key: REDIS_HOST
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gestion-etudiant-secrets
                  key: REDIS_PASSWORD
            - name: QUEUE_CONNECTION
              value: "redis"
            - name: CACHE_DRIVER
              value: "redis"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - php
                - /var/www/artisan
                - tinker
                - --execute="echo 'OK'"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: app-storage
              mountPath: /var/www/storage
            - name: app-cache
              mountPath: /var/www/bootstrap/cache

      # Nginx Sidecar Container
        - name: nginx
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: app-storage
              mountPath: /var/www
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3

      volumes:
        - name: app-storage
          emptyDir: {}
        - name: app-cache
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: gestion-etudiant-nginx-config

---
# =============================================================================
# Horizontal Pod Autoscaler
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gestion-etudiant-app-hpa
  namespace: gestion-etudiant
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gestion-etudiant-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# =============================================================================
# ConfigMap for Application Configuration
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: gestion-etudiant-config
  namespace: gestion-etudiant
data:
  DB_HOST: "gestion-etudiant-mysql"
  REDIS_HOST: "gestion-etudiant-redis"
  APP_TIMEZONE: "UTC"

---
# =============================================================================
# Secret for Sensitive Data
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: gestion-etudiant-secrets
  namespace: gestion-etudiant
type: Opaque
stringData:
  DB_CONNECTION: "mysql"
  DB_DATABASE: "gestion_etudiant"
  DB_USERNAME: "gestion_user"
  DB_PASSWORD: "your_secure_password_here"
  REDIS_PASSWORD: "your_redis_password_here"
  APP_KEY: "base64:your_generated_app_key_here"

---
# =============================================================================
# PVC for Persistent Storage
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gestion-etudiant-storage
  namespace: gestion-etudiant
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
# =============================================================================
# MySQL Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gestion-etudiant-mysql
  namespace: gestion-etudiant
  labels:
    app: gestion-etudiant
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gestion-etudiant
      tier: database
  template:
    metadata:
      labels:
        app: gestion-etudiant
        tier: database
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - name: mysql
              containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gestion-etudiant-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: gestion-etudiant-secrets
                  key: DB_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: gestion-etudiant-secrets
                  key: DB_USERNAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gestion-etudiant-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - mysql
                - -h
                - localhost
                - -u
                - root
                - -p$MYSQL_ROOT_PASSWORD
                - -e
                - SELECT 1
            initialDelaySeconds: 20
            periodSeconds: 5
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: gestion-etudiant-mysql-pvc

---
# =============================================================================
# MySQL PVC
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gestion-etudiant-mysql-pvc
  namespace: gestion-etudiant
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
# =============================================================================
# Redis Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gestion-etudiant-redis
  namespace: gestion-etudiant
  labels:
    app: gestion-etudiant
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gestion-etudiant
      tier: cache
  template:
    metadata:
      labels:
        app: gestion-etudiant
        tier: cache
    spec:
      containers:
        - name: redis
          image: redis:alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gestion-etudiant-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}

---
# =============================================================================
# Nginx ConfigMap
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: gestion-etudiant-nginx-config
  namespace: gestion-etudiant
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        keepalive_timeout 65;
        client_max_body_size 20M;

        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript
                   application/json application/javascript application/xml+rss;

        server {
            listen 80;
            server_name localhost;
            root /var/www/public;
            index index.php index.html;

            location / {
                try_files $uri $uri/ /index.php?$query_string;
            }

            location ~ \.php$ {
                try_files $uri /index.php =404;
                fastcgi_split_path_info ^(.+\.php)(/.+)$;
                fastcgi_pass 127.0.0.1:9000;
                fastcgi_index index.php;
                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                include fastcgi_params;
            }

            location ~ /\. {
                deny all;
            }

            location /health {
                access_log off;
                return 200 "OK";
            }
        }
    }
